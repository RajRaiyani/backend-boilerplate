services:
  postgres-18:
    image: postgres:18
    container_name: postgres-18
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-1234567890}
    ports:
      - '5432:5432'
    volumes:
      - postgres_18_data:/var/lib/postgresql

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend-boilerplate:
    image: rajraiyani/backend-boilerplate:latest
    pull_policy: always
    depends_on:
      - postgres-18
      - redis
    container_name: backend-boilerplate
    ports:
      - '3007:3007'
    env_file:
      - ./.env
    volumes:
      # Persist file uploads
      - ./files:/app/files
      - ./logs:/app/logs
      - ./tmp:/app/tmp
    command: sh -c "npx dbmate up && npm run start"

volumes:
  postgres_18_data:
    driver: local
  redis_data:
    driver: local
